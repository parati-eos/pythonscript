<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Cleaner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 640px;
      padding: 36px 32px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #6b7280;
      margin-bottom: 28px;
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed #c4c9d4;
      border-radius: 10px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #fafbfc;
    }

    .drop-zone.drag-over {
      border-color: #4f46e5;
      background: #eef2ff;
    }

    .drop-zone svg {
      margin-bottom: 12px;
      color: #9ca3af;
    }

    .drop-zone p {
      font-size: 0.9rem;
      color: #6b7280;
    }

    .drop-zone span {
      color: #4f46e5;
      font-weight: 600;
      cursor: pointer;
    }

    .drop-zone .hint {
      font-size: 0.78rem;
      color: #9ca3af;
      margin-top: 6px;
    }

    #file-input { display: none; }

    /* Selected files chips */
    #selected-list {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      background: #eef2ff;
      color: #3730a3;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.8rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .chip button {
      background: none;
      border: none;
      cursor: pointer;
      color: #6366f1;
      font-size: 1rem;
      line-height: 1;
      padding: 0;
    }

    /* Process button */
    #process-btn {
      margin-top: 24px;
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    #process-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #process-btn:not(:disabled):hover {
      background: #4338ca;
    }

    /* Results */
    #results {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .result-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 8px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      font-size: 0.875rem;
    }

    .result-row .filename {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #374151;
      font-weight: 500;
    }

    .badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge.processing { background: #fef3c7; color: #b45309; }
    .badge.done       { background: #d1fae5; color: #065f46; }
    .badge.error      { background: #fee2e2; color: #991b1b; }

    .download-btn {
      padding: 5px 14px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .download-btn:hover { background: #4338ca; }

    /* spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #d1d5db;
      border-top-color: #b45309;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .icon { flex-shrink: 0; font-size: 1.1rem; }

    .error-msg { font-size: 0.75rem; color: #ef4444; margin-top: 2px; }
  </style>
</head>
<body>
<div class="card">
  <h1>PDF Cleaner</h1>
  <p class="subtitle">Removes footer and header logo from every page — one by one.</p>

  <div class="drop-zone" id="drop-zone">
    <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M12 16v-8m0 0-3 3m3-3 3 3M6.75 19.5H17.25A2.25 2.25 0 0019.5 17.25v-9a2.25 2.25 0 00-2.25-2.25H6.75A2.25 2.25 0 004.5 8.25v9A2.25 2.25 0 006.75 19.5z"/>
    </svg>
    <p>Drag &amp; drop PDFs here, or <span id="browse-link">browse</span></p>
    <p class="hint">Multiple files supported &middot; PDF only</p>
    <input type="file" id="file-input" accept=".pdf" multiple />
  </div>

  <div id="selected-list"></div>

  <button id="process-btn" disabled>Process PDFs</button>

  <div id="results"></div>
</div>

<script>
  const dropZone    = document.getElementById('drop-zone');
  const fileInput   = document.getElementById('file-input');
  const browseLink  = document.getElementById('browse-link');
  const selectedList = document.getElementById('selected-list');
  const processBtn  = document.getElementById('process-btn');
  const results     = document.getElementById('results');

  let selectedFiles = [];

  browseLink.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('click', e => { if (e.target !== browseLink) fileInput.click(); });

  fileInput.addEventListener('change', () => addFiles(fileInput.files));

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    addFiles(e.dataTransfer.files);
  });

  function addFiles(fileList) {
    for (const f of fileList) {
      if (f.type === 'application/pdf' && !selectedFiles.find(x => x.name === f.name && x.size === f.size)) {
        selectedFiles.push(f);
      }
    }
    renderChips();
    processBtn.disabled = selectedFiles.length === 0;
  }

  function removeFile(idx) {
    selectedFiles.splice(idx, 1);
    renderChips();
    processBtn.disabled = selectedFiles.length === 0;
  }

  function renderChips() {
    selectedList.innerHTML = '';
    selectedFiles.forEach((f, i) => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.innerHTML = `${f.name} <button title="Remove" onclick="removeFile(${i})">&#x2715;</button>`;
      selectedList.appendChild(chip);
    });
  }

  processBtn.addEventListener('click', async () => {
    if (selectedFiles.length === 0) return;

    processBtn.disabled = true;
    results.innerHTML = '';

    // Pre-populate all rows as "queued"
    const rowMap = {};
    selectedFiles.forEach(f => {
      const row = createRow(f.name, 'queued');
      results.appendChild(row.el);
      rowMap[f.name] = row;
    });

    const form = new FormData();
    selectedFiles.forEach(f => form.append('files', f));

    try {
      const resp = await fetch('/process', { method: 'POST', body: form });
      if (!resp.ok) throw new Error(`Server error ${resp.status}`);

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop(); // last partial line stays in buffer
        for (const line of lines) {
          if (!line.trim()) continue;
          try {
            const msg = JSON.parse(line);
            updateRow(rowMap[msg.name], msg);
          } catch (_) {}
        }
      }
    } catch (err) {
      const row = document.createElement('div');
      row.className = 'result-row';
      row.style.color = '#ef4444';
      row.textContent = 'Upload failed: ' + err.message;
      results.appendChild(row);
    }

    // Allow re-processing
    selectedFiles = [];
    renderChips();
    processBtn.disabled = true;
    fileInput.value = '';
  });

  function createRow(name, status) {
    const el = document.createElement('div');
    el.className = 'result-row';
    el.innerHTML = `
      <span class="icon">📄</span>
      <span class="filename" title="${name}">${name}</span>
      <span class="badge processing">Queued</span>
    `;
    return { el, name };
  }

  function updateRow(row, msg) {
    if (!row) return;
    const badge = row.el.querySelector('.badge');
    const spinner = row.el.querySelector('.spinner');
    if (spinner) spinner.remove();

    if (msg.status === 'processing') {
      const sp = document.createElement('div');
      sp.className = 'spinner';
      row.el.insertBefore(sp, row.el.querySelector('.filename'));
      badge.className = 'badge processing';
      badge.textContent = 'Processing…';
    } else if (msg.status === 'done') {
      badge.className = 'badge done';
      badge.textContent = 'Done ✓';
      const a = document.createElement('a');
      a.className = 'download-btn';
      a.href = msg.download_url;
      a.download = '';
      a.textContent = 'Download';
      row.el.appendChild(a);
    } else if (msg.status === 'error') {
      badge.className = 'badge error';
      badge.textContent = 'Error';
      const em = document.createElement('div');
      em.className = 'error-msg';
      em.textContent = msg.error || 'Unknown error';
      row.el.appendChild(em);
    }
  }
</script>
</body>
</html>
